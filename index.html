<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkTeck | Professional Filming</title>
    <style>
        /* General Styles */
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f4f4f4;
        }

        /* Header & Hero Section */
        header {
            background: #222;
            color: #fff;
            padding: 60px 20px;
            text-align: center;
        }

        header h1 {
            font-size: 3rem;
            margin: 0;
            letter-spacing: 2px;
        }

        header p {
            font-size: 1.2rem;
            font-weight: 300;
            color: #ccc;
            margin-top: 10px;
        }

        /* Main Content */
        .container {
            max-width: 1000px;
            margin: 40px auto;
            text-align: center;
            padding: 0 20px;
        }

        .equipment-img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* Placeholder for spacing to demonstrate scrolling */
        .spacer {
            height: 1000px;
            padding: 50px;
        }

        /* Floating WhatsApp Button */
        .whatsapp-float {
            position: fixed;
            bottom: 40px;
            right: 40px;
            background-color: #25d366;
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 1000;
            transition: transform 0.3s ease;
        }

        .whatsapp-float:hover {
            transform: scale(1.1);
            background-color: #128c7e;
        }

    </style>
</head>
<body>

    <header>
        <h1>LinkTeck</h1>
        <p>YOU WANT THE BEST WE ARE THE BEST</p>
    </header>

    <div class="container">
        <img src="https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?auto=format&fit=crop&q=80&w=1000" 
             alt="Live Video Filming Equipment" 
             class="equipment-img">
        
        <h2>Our Services</h2>
        <p>Expert live video production and high-end filming solutions.</p>
    </div>

    <div class="spacer">
        <p>Scroll down to see the floating WhatsApp button follow you...</p>
    </div>

    <a href="https://wa.me/919975212789" class="whatsapp-float" target="_blank">
        <span>Chat on WhatsApp</span>
    </a>

</body>
</html>
